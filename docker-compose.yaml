services:
  postgres:
    image: postgres:16
    container_name: flowdesk-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: kave2020
      POSTGRES_DB: flowdesk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: flowdesk-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
